# Track A — local dev stack
# Boot with:   docker compose up -d
# Inspect:     docker compose ps
# Tear down:   docker compose down -v   (-v wipes volumes)
#
# All services run on the local network only; no host port collisions
# with other projects expected unless you have something else on these ports.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ifc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: catalog
      # Enable trigram + pg_stat_statements for our schema
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"          # required for Debezium CDC (Track B / Track A optional)
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ifc_redis
    restart: unless-stopped
    # NB: BullMQ requires `noeviction` so the broker doesn't drop jobs under
    # memory pressure. Don't change this without first checking BullMQ docs.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ifc_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-bucket-setup:
    image: minio/mc:latest
    container_name: ifc_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/catalog || true;
      mc anonymous set download local/catalog;
      echo 'bucket catalog ready';
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
